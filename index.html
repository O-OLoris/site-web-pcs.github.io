<html lang="fr">

<style>
  :root {
    --blue: #1a6bff;
    --red: #e8212b;
    --white: #f0f4ff;
    --dark: #0a0c14;
    --dark2: #111420;
    --dark3: #181c2e;
    --card: #141829;
    --border: rgba(255,255,255,0.07);
    --gold: #e8c132;
    --text: #c8d0e8;
    --glow-blue: 0 0 18px rgba(26,107,255,0.4);
    --glow-red: 0 0 18px rgba(232,33,43,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Animated background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(26,107,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,33,43,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,20,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .header-logo img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(26,107,255,0.5);
    box-shadow: var(--glow-blue);
    object-fit: cover;
  }

  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--blue), var(--white), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-badge {
    background: linear-gradient(135deg, var(--blue), #0040cc);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    box-shadow: var(--glow-blue);
  }

  /* ── Search bar ── */
  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 40px 9px 16px;
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }

  .search-wrap input:focus {
    border-color: rgba(26,107,255,0.6);
    box-shadow: var(--glow-blue);
  }

  .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }

  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 24px 40px;
  }

  .hero h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    font-weight: 700;
    letter-spacing: 3px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .hero h1 span.bl { color: var(--blue); }
  .hero h1 span.rd { color: var(--red); }

  .hero p {
    margin-top: 14px;
    color: var(--text);
    font-size: 1rem;
    max-width: 560px;
    margin-inline: auto;
    line-height: 1.6;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--blue);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Category nav pills ── */
  .cat-nav {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 24px 32px;
  }

  .cat-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .cat-pill:hover, .cat-pill.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    box-shadow: var(--glow-blue);
  }

  /* ── Main content ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    padding: 0 24px 60px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Category section ── */
  .category {
    margin-bottom: 56px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .cat-icon {
    font-size: 1.6rem;
  }

  .category-header h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white);
  }

  .cat-count {
    margin-left: auto;
    background: rgba(26,107,255,0.15);
    border: 1px solid rgba(26,107,255,0.3);
    color: var(--blue);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 1px;
  }

  /* ── Vehicle grid ── */
  .vehicle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .vehicle-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .vehicle-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--red));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .vehicle-card:hover {
    border-color: rgba(26,107,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), var(--glow-blue);
  }

  .vehicle-card:hover::before { opacity: 1; }

  .vehicle-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 8px;
  }

  .vehicle-cmd {
    background: rgba(26,107,255,0.12);
    border: 1px solid rgba(26,107,255,0.25);
    border-radius: 6px;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .cmd-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.5px;
    word-break: break-all;
  }

  .copy-btn {
    background: rgba(26,107,255,0.2);
    border: none;
    border-radius: 4px;
    color: var(--blue);
    cursor: pointer;
    padding: 3px 7px;
    font-size: 0.75rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .copy-btn:hover {
    background: var(--blue);
    color: #fff;
  }

  .copy-btn.copied {
    background: #1d7a3e;
    color: #7fff9c;
    border-color: #1d7a3e;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1d7a3e;
    color: #7fff9c;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 24px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── No results ── */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 24px;
    color: var(--text);
  }

  #no-results.show { display: block; }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    background: rgba(10,12,20,0.8);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    text-align: center;
  }

  footer .credits {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text);
    text-transform: uppercase;
  }

  footer .credits span.name {
    color: var(--blue);
    font-weight: 700;
  }

  footer .credits span.copy {
    color: var(--red);
  }

  footer .fr-flag {
    display: inline-flex;
    gap: 2px;
    margin-left: 6px;
  }

  footer .fr-flag span {
    display: inline-block;
    width: 8px;
    height: 14px;
    border-radius: 1px;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 0 16px; height: 64px; }
    .search-wrap { max-width: 160px; }
    .header-badge { display: none; }
    .vehicle-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

</footer>

      "hunter","maverick","merryweather","militaryhelicopter","polmav","savage","seasparrow",
      "seasparrow2","seasparrow3","skylift","sparrow","supervolito","supervolito2","swift",
      "swift2","valkyrie","valkyrie2","volatus"
    ]
  },
  "Boats": {
    icon: "⛵",
    vehicles: [
      "avisa","dinghy","dinghy2","dinghy3","dinghy4","dinghy5","jetmax","kosatka","longfin",
      "marquis","patrolboat","policeb","predator","ripley","seashark","seashark2","seashark3",
      "speeder","speeder2","squalo","submersible","submersible2","suntrap","toro","toro2","tropic",
      "tropic2","tug","weaponizedboat"
    ]
  },
  "Cycles & Bikes": {
    icon: "🚲",
    vehicles: [
      "bmx","cruiser","fixter","scorcher","tribike","tribike2","tribike3"
    ]
  }
};

// ── Build UI ── //
const mainContent = document.getElementById('mainContent');
const catNav = document.getElementById('catNav');
let totalVehicles = 0;

Object.entries(VEHICLES).forEach(([catName, catData]) => {
  // pill
  const pill = document.createElement('button');
  pill.className = 'cat-pill';
  pill.textContent = catName;
  pill.onclick = function() { filterCat(catName, this); };
  catNav.appendChild(pill);

  // section
  const section = document.createElement('section');
  section.className = 'category';
  section.dataset.cat = catName;

  const header = document.createElement('div');
  header.className = 'category-header';
  header.innerHTML = `
    <span class="cat-icon">${catData.icon}</span>
    <h2>${catName}</h2>
    <span class="cat-count">${catData.vehicles.length} véhicules</span>
  `;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'vehicle-grid';

  catData.vehicles.forEach(model => {
    const displayName = model
      .replace(/([0-9]+)/g, ' $1')
      .replace(/([A-Z])/g, ' $1')
      .trim()
      .split(' ')
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join(' ');

    const card = document.createElement('div');
    card.className = 'vehicle-card';
    card.dataset.model = model.toLowerCase();
    card.dataset.cat = catName;
    card.innerHTML = `
      <div class="vehicle-name">${model.toUpperCase()}</div>
      <div class="vehicle-cmd">
        <span class="cmd-text">/car ${model}</span>
        <button class="copy-btn" onclick="copyCmd(this, '/car ${model}')">COPIER</button>
      </div>
    `;
    grid.appendChild(card);
    totalVehicles++;
  });

  section.appendChild(grid);
  mainContent.appendChild(section);
});

document.getElementById('totalVehicles').textContent = totalVehicles;
document.getElementById('totalCats').textContent = Object.keys(VEHICLES).length;

// ── Copy ── //
function copyCmd(btn, cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = '✔ OK';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => {
      btn.textContent = 'COPIER';
      btn.classList.remove('copied');
    }, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✔ OK';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.textContent = 'COPIER'; btn.classList.remove('copied'); }, 1800);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Filter category ── //
function filterCat(cat, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.category').forEach(sec => {
    sec.style.display = (cat === 'all' || sec.dataset.cat === cat) ? '' : 'none';
  });
  const searchInput = document.getElementById('searchInput');
  if (searchInput.value) {
    searchInput.value = '';
    doSearch('');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Search ── //
document.getElementById('searchInput').addEventListener('input', function() {
  doSearch(this.value);
});

function doSearch(q) {
  const query = q.toLowerCase().trim();
  const allCards = document.querySelectorAll('.vehicle-card');
  let found = 0;

  document.querySelectorAll('.cat-pill').forEach(p => {
    if (p.textContent === 'Tout') p.classList.add('active');
    else p.classList.remove('active');
  });

  document.querySelectorAll('.category').forEach(sec => {
    let visibleInCat = 0;
    sec.querySelectorAll('.vehicle-card').forEach(card => {
      const match = !query || card.dataset.model.includes(query);
      card.style.display = match ? '' : 'none';
      if (match) { visibleInCat++; found++; }
    });
    sec.style.display = visibleInCat > 0 ? '' : 'none';
  });

  const nr = document.getElementById('no-results');
  document.getElementById('searchTerm').textContent = q;
  nr.classList.toggle('show', found === 0 && query.length > 0);
}
</script>
